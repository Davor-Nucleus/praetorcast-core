<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Followers Info</title>
    <style>

        body {
            margin: 0;
            padding: 0;
        }

        main {
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            font-family: sans-serif;
        }

        div {
            margin-bottom: 8px;
        }

        strong {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main>
        <div>
            <strong>Total Abonnés:</strong>
            <span id="totalFollowers">0</span>
        </div>
        <div>
            <strong>Dernier Abonné:</strong>
            <span id="lastFollower">Loading...</span>
        </div>
        <div>
            <strong>En cours:</strong>
            <span id="currentMusic">Loading...</span>
        </div>
    </main>

    <script>
        const MUSIC_PORT = {{ music_port }};
        const TWITCH_CHANNEL_NAME = "{{ twitch_channel_name }}";
        const TWITCH_CLIENT_ID = "{{ twitch_client_id }}";
        const TWITCH_OAUTH_TOKEN = "{{ twitch_oauth_token }}";

        const MUSIC_API = `http://localhost:${MUSIC_PORT}`;
        let intervalId = null;

        async function fetchMusicData() {
            try {
                const res = await fetch(`${MUSIC_API}/api/current_music`);
                if (res.ok) {
                    const data = await res.json();
                    const music = data.filename || data.message || "...";
                    document.getElementById('currentMusic').textContent = music;
                } else {
                    document.getElementById('currentMusic').textContent = "Off";
                }
            } catch (e) {
                document.getElementById('currentMusic').textContent = "Off";
            }
        }

        async function fetchTwitchData() {
            if (!TWITCH_CLIENT_ID || !TWITCH_OAUTH_TOKEN || !TWITCH_CHANNEL_NAME) {
                console.error('Missing Twitch credentials');
                return;
            }

            const cleanToken = TWITCH_OAUTH_TOKEN.replace("oauth:", "");
            const headers = {
                "Client-Id": TWITCH_CLIENT_ID,
                "Authorization": `Bearer ${cleanToken}`
            };

            try {
                // 1. Get Broadcaster ID
                const userRes = await fetch(
                    `https://api.twitch.tv/helix/users?login=${TWITCH_CHANNEL_NAME}`,
                    { headers }
                );

                if (!userRes.ok) {
                    console.error('Twitch User fetch failed:', await userRes.text());
                    return;
                }

                const userData = await userRes.json();
                if (userData.data && userData.data.length > 0) {
                    const broadcasterId = userData.data[0].id;

                    // 2. Get Followers
                    const followersRes = await fetch(
                        `https://api.twitch.tv/helix/channels/followers?broadcaster_id=${broadcasterId}&first=1`,
                        { headers }
                    );

                    if (followersRes.ok) {
                        const followersData = await followersRes.json();
                        document.getElementById('totalFollowers').textContent = followersData.total || 0;
                        
                        if (followersData.data && followersData.data.length > 0) {
                            document.getElementById('lastFollower').textContent = followersData.data[0].user_name;
                        } else {
                            document.getElementById('lastFollower').textContent = "Aucun";
                        }
                    } else {
                        console.error('Twitch Followers fetch failed:', await followersRes.text());
                    }
                } else {
                    console.error('Twitch User not found');
                }
            } catch (e) {
                console.error('Error fetching Twitch data:', e);
            }
        }

        // Initial fetch
        fetchMusicData();
        fetchTwitchData();

        // Set up interval
        intervalId = setInterval(() => {
            fetchMusicData();
            fetchTwitchData();
        }, 2000);

        // Cleanup on unload
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
        });
    </script>
</body>
</html>
