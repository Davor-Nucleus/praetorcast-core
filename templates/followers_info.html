<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Followers Info</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        main {
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            font-family: sans-serif;
        }

        div {
            margin-bottom: 8px;
        }

        strong {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main>
        <div>
            <strong>Total Abonnés:</strong>
            <span id="totalFollowers">-</span>
        </div>
        <div>
            <strong>Dernier Abonné:</strong>
            <span id="lastFollower">-</span>
        </div>
        <div>
            <strong>En cours:</strong>
            <span id="currentMusic">-</span>
        </div>
    </main>

    <script src="/public/js/music-api.js"></script>
    <script>
        const MUSIC_PORT = {{ music_port }};

        connectMusicWS(MUSIC_PORT, (track) => {
            document.getElementById('currentMusic').textContent = track || "Off";
        });

        function connectTwitchWS() {
            const ws = new WebSocket(`ws://${window.location.host}/api/twitch_ws`);

            ws.onmessage = (evt) => {
                const data = JSON.parse(evt.data);
                document.getElementById('totalFollowers').textContent = data.total_followers ?? '-';
                document.getElementById('lastFollower').textContent = data.last_follower ?? 'Aucun';
            };

            ws.onclose = () => setTimeout(connectTwitchWS, 5000);
            ws.onerror = () => ws.close();
        }

        window.addEventListener('load', connectTwitchWS);
    </script>
</body>
</html>
