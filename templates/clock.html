<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Horloge en direct</title>
    {% if title_font != "" %}
    <style>
        @font-face {
            font-family: 'title_font';
            src: url('{{ title_font }}') format('truetype');
        }
    </style>
    {% endif %}
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: white;
            font-family: "Impact", sans-serif;
            padding-left: 2rem;
        }
        h1 {
            font-size: 2.5em;
            text-align: center;
            font-family: {% if title_font != "" %}"title_font", {% endif %}"Impact", sans-serif;
            color: white;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: medium;
                font-family: Arial, Helvetica, sans-serif;
            }
        }
    </style>
</head>
<body>
    <h1 id="clock"></h1>
    <script>
        const format = {
            hour: {% if format_hour %}true{% else %}false{% endif %},
            minute: {% if format_minute %}true{% else %}false{% endif %},
            second: {% if format_second %}true{% else %}false{% endif %}
        };

        function updateClock() {
            const now = new Date();
            const options = {};

            if (format.hour) options.hour = '2-digit';
            if (format.minute) options.minute = '2-digit';
            if (format.second) options.second = '2-digit';

            document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR', options);
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
