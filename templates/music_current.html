<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Music Current</title>
    {% if title_font != "" %}
    <style>
        @font-face {
            font-family: 'title_font';
            src: url('{{ title_font }}') format('truetype');
        }
    </style>
    {% endif %}
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: white;
            font-family: "Impact", sans-serif;
            padding-left: 2rem;
            gap: 0.75rem;
        }


        h1 {
            font-size: 2.5em;
            text-align: center;
            font-family: {% if title_font != "" %}"title_font", {% endif %}"Impact", sans-serif;
            margin: 0;
            opacity: 0;
            min-width: 10px;
        }

        /* Animations */
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes slideOut {
            0% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
                filter: blur(5px);
            }
        }

        .music-title {
            animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
            animation-fill-mode: forwards;
        }

        .music-title.slide-in {
            animation-name: slideIn;
            animation-duration: 0.8s;
        }

        .music-title.slide-out {
            animation-name: slideOut;
            animation-duration: 0.5s;
        }

        .music-icon {
            font-size: 2.5em;
            display: flex;
            align-items: center;
            opacity: 0;
            min-width: 10px;
        }

        .cover-art {
            width: 1em;
            height: 1em;
            border-radius: 4px;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: medium;
                font-family: Arial, Helvetica, sans-serif;
            }
        }
    </style>
</head>
<body>
    <div id="iconWrapper" class="music-icon music-title"></div>
    <h1 id="musicTitle" class="music-title"></h1>

    <script>
        const MUSIC_PORT = {{ music_port }};

        let currentMusic = "";
        let currentCoverArt = null;
        let displayedMusic = "";
        let ws = null;
        let reconnectTimeout = null;
        let isAnimating = false;
        const titleElement = document.getElementById('musicTitle');
        const iconWrapper = document.getElementById('iconWrapper');

        async function updateMusic(newTitle, coverArt) {
            if (newTitle === displayedMusic && coverArt === currentCoverArt && displayedMusic !== "") return;

            if (displayedMusic && titleElement) {
                isAnimating = true;
                titleElement.classList.remove("slide-in");
                titleElement.classList.add("slide-out");
                iconWrapper.classList.remove("slide-in");
                iconWrapper.classList.add("slide-out");

                await new Promise(r => setTimeout(r, 500));
            }

            displayedMusic = newTitle;
            currentCoverArt = coverArt;

            if (displayedMusic && titleElement) {
                if (coverArt) {
                    iconWrapper.innerHTML = `<img class="cover-art" src="${coverArt}" alt="">`;
                } else {
                    iconWrapper.textContent = "🎶";
                }

                titleElement.textContent = displayedMusic;
                titleElement.classList.remove("slide-out");
                iconWrapper.classList.remove("slide-out");
                void titleElement.offsetWidth;
                titleElement.classList.add("slide-in");
                iconWrapper.classList.add("slide-in");
            } else {
                if (titleElement) {
                    titleElement.textContent = "";
                    titleElement.classList.remove("slide-out", "slide-in");
                }
                iconWrapper.innerHTML = "";
                iconWrapper.classList.remove("slide-out", "slide-in");
            }

            isAnimating = false;
        }

        function initSocket() {
            const host = window.location.hostname || "localhost";
            const wsUrl = `ws://${host}:${MUSIC_PORT}/api/current_music_ws`;

            try {
                ws = new WebSocket(wsUrl);
            } catch (e) {
                console.error("Impossible d'ouvrir le WebSocket:", e);
                reconnectTimeout = setTimeout(initSocket, 5000);
                return;
            }

            ws.addEventListener("open", () => {
                console.log("Connected to music WS:", wsUrl);
            });

            ws.addEventListener("message", (evt) => {
                let data;
                try {
                    data = JSON.parse(evt.data);
                } catch (e) {
                    return;
                }

                const current = data?.current_music ?? "";
                const coverArt = data?.metadata?.cover_art ?? null;
                const newMusicTitle = current ? current.split(".")[0] : "";

                if (newMusicTitle !== currentMusic || coverArt !== currentCoverArt) {
                    currentMusic = newMusicTitle;
                    updateMusic(newMusicTitle, coverArt);
                }
            });

            ws.addEventListener("close", () => {
                reconnectTimeout = setTimeout(initSocket, 5000);
            });

            ws.addEventListener("error", () => {
                try {
                    ws?.close();
                } catch (e) {
                    console.error("Error closing WebSocket:", e);
                }
            });
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initSocket();
        });

        // Cleanup on unload
        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
        });
    </script>
</body>
</html>
