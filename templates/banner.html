<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Banner</title>
    <style>
        @font-face {
            font-family: 'title_font';
            src: url('{{ title_font }}') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: white;
            font-family: "title_font", serif;
            overflow: hidden;
        }

        /* Conteneur plein écran de la bannière */
        .banner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background-color: transparent;
            animation: fadeIn 1s ease-in-out;
        }

        .banner-text {
            font-size: 6em;
            font-weight: bold;
            width: 100%;
            max-width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
        }

        /* Image des cartes bannière */
        .banner-image,
        .banner-overlay img {
            width: 500px;
            height: auto;
            border-radius: 10px;
        }

        /* Animation pour l'apparition */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes slideInLeft {
            0% {
                transform: translateX(-100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes zoomIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes rotateIn {
            0% {
                transform: rotate(-180deg);
                opacity: 0;
            }
            100% {
                transform: rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            0% {
                transform: translateY(50px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes zoomSlideIn {
            0% {
                transform: scale(0.5) translateX(50%);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateX(0);
                opacity: 1;
            }
        }

        @keyframes shake {
            0% {
                transform: translateX(-10px);
            }
            25% {
                transform: translateX(10px);
            }
            50% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
            100% {
                transform: translateX(0);
            }
        }

        @keyframes zoomInCircle {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(360deg);
                opacity: 1;
            }
        }

        /* Styles de carte d'origine pour compatibilité avec le JS */
        :root {
            --spacing-md: 1rem;
            --spacing-xl: 2rem;
            --radius-xl: 1rem;
        }

        .card-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            opacity: 0;
            transform: translateX(0) translateY(0) scale(1) rotateX(0deg);
        }

        .card-container {
            position: relative;
            width: 70%;
            max-width: 64rem;
            background-color: transparent;
            border-radius: var(--radius-xl);
            overflow: hidden;
            display: flex;
            flex-direction: row;
            min-height: 300px;
        }

        /* Section image */
        .image-section {
            width: 40%;
            position: relative;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md);
        }

        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 400px;
        }

        /* Section texte */
        .text-section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            position: relative;
            z-index: 10;
        }

        .text-section.has-image {
            width: 60%;
        }

        .text-section.full-width {
            width: 100%;
        }

        .bg-fill {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: transparent;
        }

        .gradient-text {
            background: linear-gradient(to right, #c084fc, #ec4899, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .animate-gradient {
            animation: gradient 5s ease infinite;
        }

        /* Classes d'animation utilisées par le JS */
        .card-wrapper.fade-in {
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .card-wrapper.fade-out {
            animation: fadeInUp 0.5s ease-out reverse forwards;
        }

        .card-wrapper.slide-in {
            opacity: 0;
            transform: translateX(200px);
            animation: slideInRight 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .card-wrapper.slide-out {
            animation: slideInLeft 0.5s cubic-bezier(0.22, 1, 0.36, 1) reverse forwards;
        }

        .card-wrapper.zoom-in {
            opacity: 0;
            transform: scale(0.8);
            animation: zoomIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .card-wrapper.zoom-out {
            animation: zoomIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) reverse forwards;
        }

        .card-wrapper.flip-in {
            opacity: 0;
            transform: translateY(100px) rotateX(90deg);
            animation: rotateIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .card-wrapper.flip-out {
            animation: rotateIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) reverse forwards;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            font-size: 1.25rem;
        }

        .card-wrapper.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="banner-overlay" id="bannerOverlay">
        <div class="empty-state" id="emptyState">
            <p>No banner cards configured or loading...</p>
        </div>
    </div>

    <script>
        const DEFAULT_DURATION_MS = 6000;

        let cards = [];
        let currentIndex = 0;
        let rotationTimer = null;
        let currentCardElement = null;
        let wsDeliveredOnce = false;

        function clearRotation() {
            if (rotationTimer) {
                clearTimeout(rotationTimer);
                rotationTimer = null;
            }
        }

        // Rotation par setTimeout récursif : chaque carte reste affichée selon sa
        // propre durée (durationMs), avec repli sur DEFAULT_DURATION_MS.
        function scheduleNext() {
            clearRotation();
            if (cards.length <= 1) return;
            const duration = (cards[currentIndex] && cards[currentIndex].durationMs) || DEFAULT_DURATION_MS;
            rotationTimer = setTimeout(() => {
                const nextIndex = (currentIndex + 1) % cards.length;
                displayCard(nextIndex);
                scheduleNext();
            }, duration);
        }

        // Applique une nouvelle config (au chargement ou poussée en direct par la WS).
        function applyConfig(newCards) {
            cards = Array.isArray(newCards) ? newCards : [];
            clearRotation();

            if (currentCardElement && currentCardElement.parentNode) {
                currentCardElement.parentNode.removeChild(currentCardElement);
            }
            currentCardElement = null;
            currentIndex = 0;

            const emptyState = document.getElementById('emptyState');
            if (cards.length > 0) {
                emptyState.style.display = 'none';
                displayCard(0);
                scheduleNext();
            } else {
                emptyState.style.display = 'flex';
            }
        }

        // Connexion WebSocket pour les mises à jour en direct (un « Save » dans le
        // configurateur se reflète sans rafraîchir la source OBS). Repli HTTP si la
        // WS n'aboutit pas, et reconnexion automatique en arrière-plan.
        function connectWs() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            let ws;
            try {
                ws = new WebSocket(`${proto}://${location.host}/api/banner_ws`);
            } catch (error) {
                loadConfigFallback();
                return;
            }

            ws.addEventListener('message', (event) => {
                wsDeliveredOnce = true;
                try {
                    applyConfig(JSON.parse(event.data));
                } catch (error) {
                    console.error('Banner WS parse error:', error);
                }
            });

            ws.addEventListener('close', () => {
                if (!wsDeliveredOnce) {
                    loadConfigFallback();
                }
                setTimeout(connectWs, 2000);
            });
        }

        async function loadConfigFallback() {
            try {
                const response = await fetch('/api/banner-config');
                applyConfig(response.ok ? await response.json() : []);
            } catch (error) {
                console.error('Error loading config:', error);
                applyConfig([]);
            }
        }

        function getTransitionClasses(type, isIn) {
            const base = type || 'fade';
            return isIn ? `${base}-in` : `${base}-out`;
        }

        function displayCard(index) {
            if (index < 0 || index >= cards.length) return;

            const card = cards[index];
            const overlay = document.getElementById('bannerOverlay');
            const oldCardElement = currentCardElement;
            const oldIndex = currentIndex;
            const transitionType = card.transition || 'fade';

            // Créer le nouvel élément
            const newCardWrapper = document.createElement('div');
            newCardWrapper.className = 'card-wrapper';
            
            const hasImage = card.imagePath && card.imagePath.trim() !== '';
            
            newCardWrapper.innerHTML = `
                <div class="card-container">
                    ${hasImage ? `
                        <div class="image-section">
                            <img src="${card.imagePath}" alt="Banner" class="banner-image" />
                        </div>
                    ` : ''}
                    <div class="text-section ${hasImage ? 'has-image' : 'full-width'}">
                        ${!hasImage ? '<div class="bg-fill"></div>' : ''}
                        <h2 class="banner-text">
                            <span class="gradient-text animate-gradient">${card.text || ''}</span>
                        </h2>
                    </div>
                </div>
            `;

            // Ajouter la nouvelle carte au DOM (invisible par défaut grâce aux keyframes)
            overlay.appendChild(newCardWrapper);
            
            // Si une carte existe déjà, démarrer les deux animations simultanément
            if (oldCardElement) {
                const oldTransitionType = (cards[oldIndex] && cards[oldIndex].transition) || 'fade';

                // Démarrer la sortie de l'ancienne carte
                oldCardElement.classList.remove(getTransitionClasses(oldTransitionType, true));
                oldCardElement.classList.add(getTransitionClasses(oldTransitionType, false));
                
                // Forcer un reflow puis démarrer l'entrée de la nouvelle carte
                requestAnimationFrame(() => {
                    newCardWrapper.className = `card-wrapper ${getTransitionClasses(transitionType, true)}`;
                });
                
                // Supprimer l'ancienne carte après sa sortie (500ms pour fade-out, slide-out, etc.)
                setTimeout(() => {
                    if (oldCardElement && oldCardElement.parentNode) {
                        oldCardElement.parentNode.removeChild(oldCardElement);
                    }
                }, 500);
            } else {
                // Première carte, démarrer l'animation d'entrée après un petit délai
                requestAnimationFrame(() => {
                    newCardWrapper.className = `card-wrapper ${getTransitionClasses(transitionType, true)}`;
                });
            }

            currentCardElement = newCardWrapper;
            currentIndex = index;
        }

        // Ouvre la WS (live update) au chargement de la page.
        window.addEventListener('load', connectWs);

        // Cleanup on unload
        window.addEventListener('beforeunload', clearRotation);
    </script>
</body>
</html>
