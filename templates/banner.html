<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banner</title>
    <style>
        @font-face {
            font-family: 'title_font';
            src: url('{{ title_font }}') format('truetype');
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            background-color: black;
            color: white;
            font-family: "title_font", serif;
            overflow: hidden;
        }

        /* Conteneur plein écran de la bannière */
        .banner-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Une carte occupe tout l'écran et centre son contenu. */
        .card-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 4vw, 4rem);
            opacity: 0;
        }

        .card-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(1rem, 3vw, 3rem);
            width: min(92vw, 1600px);
            max-width: 100%;
        }

        /* Section image */
        .image-section {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner-image {
            height: clamp(140px, 28vmin, 420px);
            width: auto;
            max-width: min(42vw, 520px);
            object-fit: contain;
            border-radius: 12px;
        }

        /* Section texte */
        .text-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            padding: clamp(0.5rem, 2vw, 1.5rem);
        }

        .text-section.has-image {
            flex: 1 1 360px;
        }

        .text-section.full-width {
            flex: 1 1 100%;
            width: 100%;
        }

        /* La taille suit le viewport (clamp) au lieu d'un em fixe : le texte reste
           proportionné, qu'on soit sur une petite ou une très grande fenêtre. */
        .banner-text {
            margin: 0;
            font-weight: bold;
            line-height: 1.05;
            text-align: center;
            overflow-wrap: break-word;
            word-break: break-word;
            text-wrap: balance;
        }

        .text-section.full-width .banner-text {
            font-size: clamp(2.5rem, 9vw, 9rem);
        }

        .text-section.has-image .banner-text {
            font-size: clamp(2rem, 6vw, 6.5rem);
        }

        /* Placeholder transparent émis par le JS quand il n'y a pas d'image. */
        .bg-fill { display: none; }

        /* Dégradé animé sur le texte */
        .gradient-text {
            background: linear-gradient(to right, #c084fc, #ec4899, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
        }

        .animate-gradient {
            animation: gradient 5s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Transitions (classes posées par le JS : <type>-in / <type>-out) --- */
        .card-wrapper.fade-in   { animation: fadeIn   0.8s ease-out both; }
        .card-wrapper.fade-out  { animation: fadeOut  0.5s ease-in  both; }
        .card-wrapper.slide-in  { animation: slideIn  0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .card-wrapper.slide-out { animation: slideOut 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .card-wrapper.zoom-in   { animation: zoomIn   0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .card-wrapper.zoom-out  { animation: zoomOut  0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .card-wrapper.flip-in   { animation: flipIn   0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .card-wrapper.flip-out  { animation: flipOut  0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }

        @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        @keyframes slideIn  { from { opacity: 0; transform: translateX(100%); }  to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOut { from { opacity: 1; transform: translateX(0); }     to { opacity: 0; transform: translateX(-100%); } }

        @keyframes zoomIn  { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes zoomOut { from { opacity: 1; transform: scale(1); }    to { opacity: 0; transform: scale(1.08); } }

        @keyframes flipIn  { from { opacity: 0; transform: perspective(1200px) rotateX(90deg); }  to { opacity: 1; transform: perspective(1200px) rotateX(0); } }
        @keyframes flipOut { from { opacity: 1; transform: perspective(1200px) rotateX(0); }      to { opacity: 0; transform: perspective(1200px) rotateX(-90deg); } }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="banner-overlay" id="bannerOverlay">
        <div class="empty-state" id="emptyState">
            <p>No banner cards configured or loading...</p>
        </div>
    </div>

    <script>
        const DEFAULT_DURATION_MS = 6000;

        let cards = [];
        let currentIndex = 0;
        let rotationTimer = null;
        let currentCardElement = null;
        let wsDeliveredOnce = false;

        function clearRotation() {
            if (rotationTimer) {
                clearTimeout(rotationTimer);
                rotationTimer = null;
            }
        }

        // Rotation par setTimeout récursif : chaque carte reste affichée selon sa
        // propre durée (durationMs), avec repli sur DEFAULT_DURATION_MS.
        function scheduleNext() {
            clearRotation();
            if (cards.length <= 1) return;
            const duration = (cards[currentIndex] && cards[currentIndex].durationMs) || DEFAULT_DURATION_MS;
            rotationTimer = setTimeout(() => {
                const nextIndex = (currentIndex + 1) % cards.length;
                displayCard(nextIndex);
                scheduleNext();
            }, duration);
        }

        // Applique une nouvelle config (au chargement ou poussée en direct par la WS).
        function applyConfig(newCards) {
            cards = Array.isArray(newCards) ? newCards : [];
            clearRotation();

            if (currentCardElement && currentCardElement.parentNode) {
                currentCardElement.parentNode.removeChild(currentCardElement);
            }
            currentCardElement = null;
            currentIndex = 0;

            const emptyState = document.getElementById('emptyState');
            if (cards.length > 0) {
                emptyState.style.display = 'none';
                displayCard(0);
                scheduleNext();
            } else {
                emptyState.style.display = 'flex';
            }
        }

        // Connexion WebSocket pour les mises à jour en direct (un « Save » dans le
        // configurateur se reflète sans rafraîchir la source OBS). Repli HTTP si la
        // WS n'aboutit pas, et reconnexion automatique en arrière-plan.
        function connectWs() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            let ws;
            try {
                ws = new WebSocket(`${proto}://${location.host}/api/banner_ws`);
            } catch (error) {
                loadConfigFallback();
                return;
            }

            ws.addEventListener('message', (event) => {
                wsDeliveredOnce = true;
                try {
                    applyConfig(JSON.parse(event.data));
                } catch (error) {
                    console.error('Banner WS parse error:', error);
                }
            });

            ws.addEventListener('close', () => {
                if (!wsDeliveredOnce) {
                    loadConfigFallback();
                }
                setTimeout(connectWs, 2000);
            });
        }

        async function loadConfigFallback() {
            try {
                const response = await fetch('/api/banner-config');
                applyConfig(response.ok ? await response.json() : []);
            } catch (error) {
                console.error('Error loading config:', error);
                applyConfig([]);
            }
        }

        function getTransitionClasses(type, isIn) {
            const base = type || 'fade';
            return isIn ? `${base}-in` : `${base}-out`;
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value;
            return div.innerHTML;
        }

        function displayCard(index) {
            if (index < 0 || index >= cards.length) return;

            const card = cards[index];
            const overlay = document.getElementById('bannerOverlay');
            const oldCardElement = currentCardElement;
            const oldIndex = currentIndex;
            const transitionType = card.transition || 'fade';

            // Créer le nouvel élément
            const newCardWrapper = document.createElement('div');
            newCardWrapper.className = 'card-wrapper';

            const hasImage = card.imagePath && card.imagePath.trim() !== '';

            newCardWrapper.innerHTML = `
                <div class="card-container">
                    ${hasImage ? `
                        <div class="image-section">
                            <img src="${card.imagePath}" alt="Banner" class="banner-image" />
                        </div>
                    ` : ''}
                    <div class="text-section ${hasImage ? 'has-image' : 'full-width'}">
                        ${!hasImage ? '<div class="bg-fill"></div>' : ''}
                        <h2 class="banner-text">
                            <span class="gradient-text animate-gradient">${escapeHtml(card.text || '')}</span>
                        </h2>
                    </div>
                </div>
            `;

            // Ajouter la nouvelle carte au DOM (invisible par défaut)
            overlay.appendChild(newCardWrapper);

            // Si une carte existe déjà, démarrer les deux animations simultanément
            if (oldCardElement) {
                const oldTransitionType = (cards[oldIndex] && cards[oldIndex].transition) || 'fade';

                // Démarrer la sortie de l'ancienne carte
                oldCardElement.classList.remove(getTransitionClasses(oldTransitionType, true));
                oldCardElement.classList.add(getTransitionClasses(oldTransitionType, false));

                // Forcer un reflow puis démarrer l'entrée de la nouvelle carte
                requestAnimationFrame(() => {
                    newCardWrapper.className = `card-wrapper ${getTransitionClasses(transitionType, true)}`;
                });

                // Supprimer l'ancienne carte après sa sortie (0.5s)
                setTimeout(() => {
                    if (oldCardElement && oldCardElement.parentNode) {
                        oldCardElement.parentNode.removeChild(oldCardElement);
                    }
                }, 500);
            } else {
                // Première carte, démarrer l'animation d'entrée
                requestAnimationFrame(() => {
                    newCardWrapper.className = `card-wrapper ${getTransitionClasses(transitionType, true)}`;
                });
            }

            currentCardElement = newCardWrapper;
            currentIndex = index;
        }

        // Ouvre la WS (live update) au chargement de la page.
        window.addEventListener('load', connectWs);

        // Cleanup on unload
        window.addEventListener('beforeunload', clearRotation);
    </script>
</body>
</html>
