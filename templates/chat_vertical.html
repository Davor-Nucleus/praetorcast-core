<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chat Vertical</title>
    <style>
        html {
            overflow-y: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            overflow: hidden;
            font-family: "Open Sans", sans-serif;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }

        body::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
            overflow-y: hidden;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }

        .container::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        #chat {
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-start;
            gap: 10px;
            height: 100%;
            overflow-y: hidden;
            padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }

        #chat::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .message {
            flex: 0 0 auto;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 4px;
            width: fit-content;
            max-width: 90%;
            color: #efeff1;
            white-space: normal;
            overflow-wrap: break-word;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .message.fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .username {
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: sans-serif;
            margin-left: 0.25rem;
        }

        .message-content {
            line-height: 1.4;
        }

        .emote {
            height: 1.5em;
            vertical-align: middle;
            margin: -3px 1px;
        }

        .badge {
            height: 1em;
            margin-right: 3px;
            vertical-align: middle;
        }

        .meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="chat"></div>
    </div>

    <script src="/public/js/joypixels.min.js"></script>
    <script src="/public/js/chat-common.js"></script>
    <script>
        const TWITCH_CHANNEL_NAME = "{{ twitch_channel_name }}";
        const TWITCH_CLIENT_ID = "{{ twitch_client_id }}";
        const TWITCH_OAUTH_TOKEN = "{{ twitch_oauth_token }}";
        const PORT_WS_YOUTUBE_CHAT = {{ port_ws_youtube_chat }};

        const MAX_MESSAGES = 20;
        let messages = [];
        let ws = null;
        let ytWs = null;
        let pingInterval = null;
        let youtubeConnected = false;
        const messageTimeouts = new Set();

        let globalBadges = {};
        let channelBadges = {};

        window.addEventListener('load', () => {
            connectTwitch();
            connectYouTubeSSE();
        });

        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            if (ytWs) ytWs.close();
            clearInterval(pingInterval);
            messageTimeouts.forEach(clearTimeout);
            messageTimeouts.clear();
        });
    </script>
</body>
</html>
