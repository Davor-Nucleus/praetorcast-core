<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Banner Configurator</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-light: #333333;
            --accent-primary: #3b82f6;
            --accent-secondary: #2563eb;
            --accent-glow: #60a5fa;
            --danger: #ef4444;
            --danger-bg: #450a0a;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: "Instrument Sans", sans-serif;
        }

        .page-container {
            min-height: 100vh;
            padding: var(--spacing-xl);
        }

        .page-header {
            margin-bottom: var(--spacing-xl);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--accent-glow);
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-md);
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-save {
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            max-width: 56rem;
            margin: 0 auto;
        }

        .card-item {
            background-color: var(--bg-card);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: var(--spacing-lg);
            align-items: flex-start;
            transition: transform 0.3s ease;
        }

        .image-upload-container {
            width: 8rem;
            height: 8rem;
            flex-shrink: 0;
            background-color: var(--bg-dark);
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-light);
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .upload-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-upload-container:hover .upload-overlay {
            opacity: 1;
        }

        .upload-label {
            cursor: pointer;
            font-size: 0.75rem;
            color: white;
            text-decoration: underline;
        }

        .hidden-input {
            display: none;
        }

        .controls-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .input-field {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm);
            color: var(--text-main);
            font-size: 0.875rem;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-glow);
        }

        .select-field {
            appearance: none;
        }

        .actions-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .btn-icon {
            padding: var(--spacing-sm);
            background-color: var(--border-light);
            border-radius: var(--radius-md);
            color: var(--text-main);
            border: none;
            cursor: pointer;
        }

        .btn-icon:hover {
            background-color: #525252;
        }

        .btn-icon:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-delete {
            background-color: var(--danger-bg);
            color: var(--danger);
            margin-top: auto;
        }

        .btn-delete:hover {
            background-color: rgba(239, 68, 68, 0.2);
        }

        .btn-add-card {
            width: 100%;
            padding: var(--spacing-md);
            border: 2px dashed var(--border-light);
            border-radius: var(--radius-lg);
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add-card:hover {
            border-color: var(--accent-glow);
            color: var(--accent-glow);
        }

        /* --- Aperçu en direct d'une carte (reproduit le rendu de l'overlay) --- */
        .preview-panel {
            max-width: 56rem;
            margin: 0 auto var(--spacing-lg);
        }

        .preview-stage {
            position: relative;
            height: 200px;
            background-color: #000;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-hint {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .btn-preview {
            background-color: var(--border-light);
            color: var(--text-main);
            font-size: 0.75rem;
            padding: 0.35rem;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
        }

        .btn-preview:hover {
            background-color: #525252;
        }

        .preview-stage .card-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md);
        }

        .preview-stage .card-container {
            width: 80%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
        }

        .preview-stage .image-section {
            flex-shrink: 0;
        }

        .preview-stage .banner-image-preview {
            max-height: 140px;
            max-width: 40%;
            border-radius: var(--radius-md);
        }

        .preview-stage .banner-text {
            margin: 0;
            font-size: 1.75rem;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-stage .gradient-text {
            background: linear-gradient(to right, #c084fc, #ec4899, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
        }

        .preview-stage .animate-gradient {
            animation: previewGradient 5s ease infinite;
        }

        @keyframes previewGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes previewFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes previewSlide {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes previewZoom {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes previewFlip {
            from { transform: translateY(60px) rotateX(90deg); opacity: 0; }
            to { transform: translateY(0) rotateX(0deg); opacity: 1; }
        }

        .preview-stage .card-wrapper.fade-in { animation: previewFade 0.8s ease-out both; }
        .preview-stage .card-wrapper.slide-in { animation: previewSlide 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .preview-stage .card-wrapper.zoom-in { animation: previewZoom 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .preview-stage .card-wrapper.flip-in { animation: previewFlip 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <div>
                <h1 class="page-title">Banner Configurator</h1>
                <p class="page-subtitle">Manage your rotating banner cards.</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="/" style="color: var(--text-muted); text-decoration: underline;">Back to Home</a>
                <button onclick="saveConfig()" class="btn btn-save">Save Configuration</button>
            </div>
        </header>

        <div class="preview-panel">
            <div class="preview-stage" id="previewStage">
                <span class="preview-hint">Cliquez « Aperçu » sur une carte pour la prévisualiser.</span>
            </div>
        </div>

        <div class="card-list" id="cardList">
            <!-- Les cartes seront ajoutées dynamiquement -->
        </div>
    </div>

    <script>
        let bannerCards = [];

        async function loadConfig() {
            try {
                const response = await fetch('/api/banner-config');
                if (response.ok) {
                    bannerCards = await response.json();
                    renderCards();
                } else {
                    console.error('Failed to load config');
                }
            } catch (error) {
                console.error('Error loading config:', error);
            }
        }

        function renderCards() {
            const cardList = document.getElementById('cardList');
            cardList.innerHTML = '';

            bannerCards.forEach((card, index) => {
                const cardItem = document.createElement('div');
                cardItem.className = 'card-item';
                cardItem.innerHTML = `
                    <div class="image-upload-container">
                        ${card.imagePath ? `<img src="${card.imagePath}" alt="Card Preview" class="preview-image" />` : '<div class="no-image-placeholder">No Image</div>'}
                        <div class="upload-overlay">
                            <label class="upload-label">
                                Change
                                <input type="file" accept="image/*" class="hidden-input" onchange="handleImageUpload(${index}, event)" />
                            </label>
                        </div>
                    </div>
                    <div class="controls-container">
                        <div class="control-group">
                            <label for="text-${index}" class="control-label">Text Content</label>
                            <input id="text-${index}" type="text" value="${card.text || ''}" placeholder="Enter text..." class="input-field" onchange="updateCardText(${index}, this.value)" />
                        </div>
                        <div class="control-group">
                            <label for="transition-${index}" class="control-label">Transition Effect</label>
                            <select id="transition-${index}" class="input-field select-field" onchange="updateCardTransition(${index}, this.value)">
                                <option value="fade" ${card.transition === 'fade' ? 'selected' : ''}>Fade</option>
                                <option value="slide" ${card.transition === 'slide' ? 'selected' : ''}>Slide</option>
                                <option value="zoom" ${card.transition === 'zoom' ? 'selected' : ''}>Zoom</option>
                                <option value="flip" ${card.transition === 'flip' ? 'selected' : ''}>Flip</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label for="duration-${index}" class="control-label">Durée (s) — vide = 6s par défaut</label>
                            <input id="duration-${index}" type="number" min="1" step="0.5" value="${card.durationMs ? card.durationMs / 1000 : ''}" placeholder="6" class="input-field" onchange="updateCardDuration(${index}, this.value)" />
                        </div>
                    </div>
                    <div class="actions-container">
                        <button onclick="previewCard(${index})" class="btn-preview">Aperçu</button>
                        <button onclick="moveUp(${index})" class="btn-icon" ${index === 0 ? 'disabled' : ''}>↑</button>
                        <button onclick="moveDown(${index})" class="btn-icon" ${index === bannerCards.length - 1 ? 'disabled' : ''}>↓</button>
                        <button onclick="removeCard(${index})" class="btn-icon btn-delete">✕</button>
                    </div>
                `;
                cardList.appendChild(cardItem);
            });

            const addButton = document.createElement('button');
            addButton.className = 'btn-add-card';
            addButton.textContent = '+ Add New Card';
            addButton.onclick = addCard;
            cardList.appendChild(addButton);
        }

        function addCard() {
            bannerCards.push({
                id: null,
                text: '',
                imagePath: '',
                transition: 'fade',
                order: bannerCards.length
            });
            renderCards();
        }

        function removeCard(index) {
            bannerCards = bannerCards.filter((_, i) => i !== index);
            renderCards();
        }

        async function handleImageUpload(index, event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/banner-upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    bannerCards[index].imagePath = data.path;
                    renderCards();
                    refreshPreviewIfActive(index);
                } else {
                    alert('Failed to upload image');
                }
            } catch (error) {
                console.error('Error uploading image:', error);
                alert('Error uploading image');
            }
        }

        let currentPreviewIndex = null;

        function updateCardText(index, value) {
            bannerCards[index].text = value;
            refreshPreviewIfActive(index);
        }

        function updateCardTransition(index, value) {
            bannerCards[index].transition = value;
            refreshPreviewIfActive(index);
        }

        function updateCardDuration(index, value) {
            const seconds = parseFloat(value);
            // Vide / invalide → on retire la durée pour retomber sur le défaut (6 s).
            bannerCards[index].durationMs = (isNaN(seconds) || seconds <= 0) ? undefined : Math.round(seconds * 1000);
        }

        // Rejoue l'animation de la carte dans le panneau d'aperçu (reproduit l'overlay).
        function previewCard(index) {
            currentPreviewIndex = index;
            const card = bannerCards[index];
            const stage = document.getElementById('previewStage');
            const hasImage = card.imagePath && card.imagePath.trim() !== '';
            const transition = card.transition || 'fade';

            stage.innerHTML = `
                <div class="card-wrapper ${transition}-in">
                    <div class="card-container">
                        ${hasImage ? `
                            <div class="image-section">
                                <img src="${card.imagePath}" alt="Banner" class="banner-image-preview" />
                            </div>
                        ` : ''}
                        <div class="text-section">
                            <h2 class="banner-text">
                                <span class="gradient-text animate-gradient">${escapeHtml(card.text || '')}</span>
                            </h2>
                        </div>
                    </div>
                </div>
            `;
        }

        function refreshPreviewIfActive(index) {
            if (index === currentPreviewIndex && bannerCards[index]) {
                previewCard(index);
            }
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value;
            return div.innerHTML;
        }

        function moveUp(index) {
            if (index > 0) {
                const temp = bannerCards[index];
                bannerCards[index] = bannerCards[index - 1];
                bannerCards[index - 1] = temp;
                renderCards();
            }
        }

        function moveDown(index) {
            if (index < bannerCards.length - 1) {
                const temp = bannerCards[index];
                bannerCards[index] = bannerCards[index + 1];
                bannerCards[index + 1] = temp;
                renderCards();
            }
        }

        async function saveConfig() {
            try {
                const response = await fetch('/api/banner-config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bannerCards)
                });

                if (response.ok) {
                    alert('Configuration saved successfully!');
                    await loadConfig();
                } else {
                    const error = await response.json();
                    alert('Failed to save configuration: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error saving config:', error);
                alert('Failed to save configuration: ' + error);
            }
        }

        // Load config on page load
        window.addEventListener('load', loadConfig);
    </script>
</body>
</html>
