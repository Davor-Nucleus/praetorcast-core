<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Emote Corner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: transparent !important;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .bouncing-emote {
            position: fixed;
            pointer-events: none;
            transition: opacity 0.5s ease;
            transform-origin: center center;
        }

        .bouncing-emote img {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <script src="/public/js/chat-common.js"></script>
    <script>
        const TWITCH_CHANNEL_NAME = "{{ twitch_channel_name }}";
        const TWITCH_OAUTH_TOKEN = "{{ twitch_oauth_token }}";
        const DURATION = 5000;
        const MAX_EMOTES = 50;
        let ws = null;
        let pingInterval = null;

        function parseEmoteUrls(emotesTag) {
            if (!emotesTag) return [];
            const urls = [];
            emotesTag.split("/").forEach(group => {
                const [id, positions] = group.split(":");
                if (!id || !positions) return;
                positions.split(",").forEach(() => {
                    urls.push(`https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/2.0`);
                });
            });
            return urls;
        }

        function spawnEmote(url) {
            if (document.querySelectorAll('.bouncing-emote').length >= MAX_EMOTES) return;
            const BASE = 48;
            const el = document.createElement('div');
            el.className = 'bouncing-emote';

            const img = document.createElement('img');
            img.src = url;
            el.appendChild(img);
            document.body.appendChild(el);

            let x = Math.random() * (window.innerWidth - BASE);
            let y = Math.random() * (window.innerHeight - BASE);
            const speed = 2.5 + Math.random() * 2;
            const angle = Math.random() * Math.PI * 2;
            let vx = Math.cos(angle) * speed;
            let vy = Math.sin(angle) * speed;
            const startTime = performance.now();
            let rafId;
            console.log(DURATION);
            

            function tick(now) {
                const elapsed = now - startTime;

                if (elapsed >= DURATION) {
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 500);
                    return;
                }

                // Size: oscillate between 0.6x and 1.8x base
                const scale = 1 + 0.6 * Math.sin(elapsed / 600);
                const size = BASE * scale;

                x += vx;
                y += vy;

                if (x <= 0)                          { x = 0;                          vx = Math.abs(vx); }
                if (x + size >= window.innerWidth)   { x = window.innerWidth - size;   vx = -Math.abs(vx); }
                if (y <= 0)                          { y = 0;                          vy = Math.abs(vy); }
                if (y + size >= window.innerHeight)  { y = window.innerHeight - size;  vy = -Math.abs(vy); }

                el.style.left      = `${x}px`;
                el.style.top       = `${y}px`;
                el.style.width     = `${size}px`;
                el.style.height    = `${size}px`;

                rafId = requestAnimationFrame(tick);
            }

            rafId = requestAnimationFrame(tick);

            setTimeout(() => {
                cancelAnimationFrame(rafId);
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 500);
            }, DURATION);
        }

        function parseTwitchMessage(line) {
            const splitIdx = line.indexOf(" :");
            if (splitIdx === -1) return;

            const tags = parseTags(line.substring(0, splitIdx));
            if (!line.substring(splitIdx + 2).includes("PRIVMSG")) return;

            const urls = parseEmoteUrls(tags["emotes"]);
            console.log("emotes tag:", tags["emotes"], "→", urls.length, "spawns");
            urls.forEach(url => spawnEmote(url));
        }

        async function connectTwitch() {
            const channel = TWITCH_CHANNEL_NAME;
            const token = TWITCH_OAUTH_TOKEN;

            if (!channel) return;

            ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

            ws.onopen = () => {
                ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership");
                if (token) {
                    ws.send(`PASS oauth:${token.replace("oauth:", "")}`);
                    ws.send(`NICK ${channel}`);
                } else {
                    ws.send("PASS SCHMOOPIIE");
                    ws.send("NICK justinfan123");
                }
                ws.send(`JOIN #${channel.toLowerCase()}`);
                pingInterval = setInterval(() => ws.send("PING"), 60000);
            };

            ws.onmessage = (event) => {
                const data = event.data;
                if (data.includes("PING")) { ws.send("PONG :tmi.twitch.tv"); return; }
                if (data.includes("PRIVMSG")) {
                    data.split("\r\n").forEach(line => {
                        if (line.includes("PRIVMSG")) parseTwitchMessage(line);
                    });
                }
            };

            ws.onclose = () => {
                clearInterval(pingInterval);
                setTimeout(connectTwitch, 3000);
            };
        }

        window.addEventListener('load', () => connectTwitch());

        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            clearInterval(pingInterval);
        });
    </script>
</body>
</html>
